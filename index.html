<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Intel Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06070a;
      --surface: #0f1117;
      --border: #1e293b;
      --text: #e2e8f0;
      --muted: #64748b;
      --blue: #38bdf8;
      --purple: #818cf8;
      --pink: #f472b6;
      --green: #34d399;
      --red: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    .wrap {
      max-width: 740px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 48px; }

    .header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 50%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* Search */
    .search-row {
      width: 100%;
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .search-input {
      flex: 1;
      padding: 14px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }
    .search-input::placeholder { color: #334155; }
    .search-input:disabled { opacity: 0.5; }

    .search-btn {
      padding: 14px 26px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none;
      border-radius: 12px;
      color: #06070a;
      font-size: 0.92rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Container */
    .container { width: 100%; display: flex; flex-direction: column; gap: 18px; }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #334155;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.active { background: var(--blue); box-shadow: 0 0 8px var(--blue); animation: pulse 1.2s infinite; }
    .dot.done { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.error { background: var(--red); box-shadow: 0 0 8px var(--red); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .status-count { margin-left: auto; color: var(--green); }

    /* Section */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .section-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .section-body { padding: 18px; }

    /* Sources */
    .sources-grid { display: flex; flex-direction: column; gap: 10px; }

    .source-card {
      padding: 12px 14px;
      background: #060b11;
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color 0.2s;
    }
    .source-card:hover { border-color: var(--blue); }

    .source-title { font-size: 0.88rem; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 3px; }
    .source-url { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .source-snippet { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }

    /* Keywords */
    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      margin: 0 4px 6px 0;
    }
    .tag-b { background: rgba(56,189,248,0.1); color: var(--blue); border: 1px solid rgba(56,189,248,0.2); }
    .tag-p { background: rgba(129,140,248,0.1); color: var(--purple); border: 1px solid rgba(129,140,248,0.2); }
    .tag-g { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

    /* Analysis */
    .analysis-text {
      font-size: 0.9rem;
      line-height: 1.85;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .analysis-text h2 { color: var(--text); font-size: 1rem; margin: 1.2em 0 0.4em; }
    .analysis-text h3 { color: var(--text); font-size: 0.95rem; margin: 1em 0 0.3em; }

    /* Skeleton */
    .skeleton {
      height: 13px;
      border-radius: 6px;
      background: linear-gradient(90deg, #1e293b 25%, #273344 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 10px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* Error */
    .error-msg { color: var(--red); font-size: 0.85rem; font-family: 'Space Mono', monospace; line-height: 1.7; }

    /* API key notice */
    .notice {
      width: 100%;
      padding: 14px 18px;
      background: rgba(248,180,0,0.06);
      border: 1px solid rgba(248,180,0,0.2);
      border-radius: 10px;
      font-size: 0.8rem;
      font-family: 'Space Mono', monospace;
      color: #fbbf24;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .notice a { color: #38bdf8; }

    .key-row { display: flex; gap: 8px; width: 100%; margin-bottom: 20px; }
    .key-input {
      flex: 1;
      padding: 11px 14px;
      background: var(--surface);
      border: 1.5px solid rgba(248,180,0,0.3);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.82rem;
      font-family: 'Space Mono', monospace;
      outline: none;
    }
    .key-input:focus { border-color: #fbbf24; }
    .key-input::placeholder { color: #334155; }

    .key-btn {
      padding: 11px 18px;
      background: rgba(248,180,0,0.12);
      border: 1px solid rgba(248,180,0,0.3);
      border-radius: 10px;
      color: #fbbf24;
      font-size: 0.8rem;
      font-family: 'Space Mono', monospace;
      cursor: pointer;
      transition: background 0.2s;
    }
    .key-btn:hover { background: rgba(248,180,0,0.2); }

    .key-saved { color: var(--green); font-size: 0.75rem; font-family: 'Space Mono', monospace; margin-top: -14px; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Web Intel Analyzer</h1>
    <p>// real-time search + AI synthesis engine</p>
  </div>

  <div class="notice">
    ⚠ This tool requires an Anthropic API key to run. Get one at
    <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>.
    Your key is stored only in your browser (localStorage) and never sent anywhere except Anthropic's API.
  </div>

  <div class="key-row">
    <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-... paste your Anthropic API key" />
    <button class="key-btn" onclick="saveKey()">Save Key</button>
  </div>
  <div class="key-saved" id="keySaved" style="display:none">✓ Key saved</div>

  <div class="search-row">
    <input class="search-input" id="queryInput" placeholder="Enter any topic, question, or keyword..." />
    <button class="search-btn" id="searchBtn" onclick="runSearch()">Analyze →</button>
  </div>

  <div class="container" id="container">
    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span id="statusText">Ready — enter a topic to begin</span>
      <span class="status-count" id="sourceCount" style="display:none"></span>
    </div>
  </div>
</div>

<script>
  // Restore key
  const savedKey = localStorage.getItem('anthropic_key');
  if (savedKey) {
    document.getElementById('keyInput').value = savedKey;
    document.getElementById('keySaved').style.display = 'block';
  }

  document.getElementById('queryInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runSearch();
  });

  function saveKey() {
    const k = document.getElementById('keyInput').value.trim();
    if (!k) return;
    localStorage.setItem('anthropic_key', k);
    document.getElementById('keySaved').style.display = 'block';
  }

  function getKey() {
    return localStorage.getItem('anthropic_key') || document.getElementById('keyInput').value.trim();
  }

  function setStatus(phase, text, count) {
    const dot = document.getElementById('dot');
    dot.className = 'dot' + (phase === 'active' ? ' active' : phase === 'done' ? ' done' : phase === 'error' ? ' error' : '');
    document.getElementById('statusText').textContent = text;
    const sc = document.getElementById('sourceCount');
    if (count) { sc.textContent = count + ' sources'; sc.style.display = 'block'; }
    else sc.style.display = 'none';
  }

  function clearSections() {
    const c = document.getElementById('container');
    // Remove everything except the status bar (first child)
    while (c.children.length > 1) c.removeChild(c.lastChild);
  }

  function addSection(icon, label, id) {
    const s = document.createElement('div');
    s.className = 'section';
    s.innerHTML = `
      <div class="section-head"><span>${icon}</span>${label}</div>
      <div class="section-body" id="${id}"></div>
    `;
    document.getElementById('container').appendChild(s);
    return document.getElementById(id);
  }

  function skeletons(n) {
    return Array.from({length: n}, (_, i) =>
      `<div class="skeleton" style="width:${65 + Math.random()*30}%"></div>`
    ).join('');
  }

  function extractKeywords(text) {
    const stop = new Set(['the','and','for','are','was','were','this','that','with','from','have','been','they','will','its','but','not','you','all','can','her','his','our','out','one','had','has','him','who','did','get','how','now','new','use','may','any','see','way','more','than','some','also','into','just','like','most','over','such','then','them','time','very','when','your','year','two','what','said','each','which','their','would','other','about','there','these','those','being','could','after','where','while','through','should','before','between','because','however','although']);
    const words = text.toLowerCase().match(/\b[a-z]{4,}\b/g) || [];
    const freq = {};
    words.forEach(w => { if (!stop.has(w)) freq[w] = (freq[w]||0)+1; });
    return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([w])=>w);
  }

  async function callClaude(messages, useSearch, apiKey) {
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages,
    };
    if (useSearch) body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify(body),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data;
  }

  async function runSearch() {
    const query = document.getElementById('queryInput').value.trim();
    const apiKey = getKey();

    if (!query) return;
    if (!apiKey) { alert('Please enter your Anthropic API key first.'); return; }

    const btn = document.getElementById('searchBtn');
    const input = document.getElementById('queryInput');
    btn.disabled = true; input.disabled = true;
    btn.textContent = 'Running...';

    clearSections();
    setStatus('active', 'Searching the web for sources...');

    try {
      // Step 1: get sources
      const sourcesBody = addSection('🔍', 'Sources Retrieved', 'sourcesBody');
      sourcesBody.innerHTML = skeletons(3);

      const extractData = await callClaude([{
        role: 'user',
        content: `Search the web for "${query}" and return a JSON array of 5 relevant sources. Each: {title, url, snippet}. Return ONLY valid JSON, no markdown.`
      }], true, apiKey);

      const extractText = extractData.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      let sources = [];
      try {
        sources = JSON.parse(extractText.replace(/```json|```/g,'').trim());
      } catch {
        sources = [{ title: 'Web search completed', url: 'https://www.google.com', snippet: 'Results analyzed from live web search.' }];
      }

      sourcesBody.innerHTML = '';
      sources.forEach(s => {
        sourcesBody.innerHTML += `
          <div class="source-card">
            <div class="source-title">${s.title || 'Source'}</div>
            <div class="source-url">${s.url || ''}</div>
            <div class="source-snippet">${s.snippet || ''}</div>
          </div>`;
      });
      setStatus('active', 'Analyzing & synthesizing findings...', sources.length);

      // Step 2: analysis
      const analysisBody = addSection('🧠', 'AI Analysis', 'analysisBody');
      analysisBody.innerHTML = skeletons(6);

      const analyzeData = await callClaude([{
        role: 'user',
        content: `Search the web and write a detailed analytical report about: "${query}".

Structure it with these sections:
## Overview
## Key Findings
## Important Details
## Current Trends
## Summary & Takeaways

Be factual, insightful, and cite specific details you find.`
      }], true, apiKey);

      const analysisText = analyzeData.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');

      // Keywords
      const kw = extractKeywords(query + ' ' + analysisText);
      const kwBody = addSection('🏷', 'Key Concepts Detected', 'kwBody');
      const colors = ['tag-b','tag-p','tag-g'];
      kwBody.innerHTML = kw.map((w,i) => `<span class="tag ${colors[i%3]}">${w}</span>`).join('');

      // Render analysis with streaming effect
      analysisBody.innerHTML = '<div class="analysis-text" id="analysisText"></div>';
      const el = document.getElementById('analysisText');
      let i = 0;
      const formatted = formatAnalysis(analysisText);
      const interval = setInterval(() => {
        i += 8;
        el.innerHTML = formatAnalysis(analysisText.slice(0, i));
        if (i >= analysisText.length) { el.innerHTML = formatted; clearInterval(interval); }
      }, 16);

      setStatus('done', 'Analysis complete', sources.length);

    } catch (err) {
      const errBody = addSection('⚠️', 'Error', 'errBody');
      errBody.innerHTML = `<div class="error-msg">${err.message}</div>`;
      setStatus('error', 'An error occurred');
    }

    btn.disabled = false; input.disabled = false;
    btn.textContent = 'Analyze →';
  }

  function formatAnalysis(text) {
    return text
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }
</script>
</body>
</html>
